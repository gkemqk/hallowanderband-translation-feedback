<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hallowanderband Transration Feedback</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: "Simple";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-1@1.1/Danjo-bold-Regular.woff2") format("woff2");
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --bg: #1b2838;
      --panel: rgba(36, 22, 49, 0.94);
      --panel-bottom: rgba(27, 40, 56, 0.96);
      --field: #fff7fb;
      --field-readonly: #fff0f0;
      --line: #b18597;
      --line-focus: #ff6aba;
      --text: #fff9fd;
      --ink: #382b22;
      --muted: #ffd6e5;
      --light-pink: #fff0f0;
      --pink: #ffe9e9;
      --dark-pink: #f9c4d2;
      --pink-border: #b18597;
      --pink-shadow: #ffe3e2;
      --button-face: #3a155a;
      --button-face-hover: #4a1b70;
      --button-base: #1d0c2f;
      --button-border: #8f68b3;
      --button-shadow: rgba(24, 7, 39, 0.72);
      --error: #ffb3b3;
      --success: #b7f5c2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Simple", Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 14px;
      background:
        linear-gradient(180deg, rgba(20, 10, 34, 0.24), rgba(8, 14, 24, 0.68)),
        url("assets/bg-feedback.png") center / cover fixed no-repeat,
        var(--bg);
    }

    body::before {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.36), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.36)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.44));
    }

    .page-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
    }

    .brand-logo {
      position: relative;
      z-index: 4;
      display: block;
      width: min(360px, 76vw);
      height: auto;
      margin: 0 auto -28px;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.5));
    }

    main {
      position: relative;
      z-index: 2;
      width: 100%;
      margin: 0 auto;
      padding: 42px 28px 26px;
      border: 2px solid rgba(255, 180, 220, 0.78);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 104, 188, 0.1), rgba(0, 0, 0, 0)),
        linear-gradient(180deg, var(--panel), var(--panel-bottom));
      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.5),
        inset 0 0 0 2px rgba(255, 255, 255, 0.06);
    }

    .card-layout {
      display: block;
    }

    .form-area {
      min-width: 0;
    }

    .character-art {
      display: block;
      position: fixed;
      right: max(18px, calc((100vw - 980px) / 2));
      bottom: 8px;
      z-index: 3;
      width: min(380px, 36vw);
      height: auto;
      pointer-events: none;
      filter: drop-shadow(0 12px 14px rgba(0, 0, 0, 0.45));
    }

    h1 {
      margin: 0 0 8px;
      color: #fff8fb;
      font-size: 24px;
      line-height: 1.25;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      color: #ffe6f0;
      font-size: 14px;
      font-weight: 700;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.28);
    }

    .label-note {
      position: relative;
      top: 2px;
      margin-left: 8px;
      color: rgba(224, 218, 230, 0.72);
      font-size: 10px;
      font-style: italic;
      font-weight: normal;
      text-shadow: none;
      vertical-align: middle;
    }

    textarea {
      display: block;
      width: 100%;
      height: 120px !important;
      min-height: 120px !important;
      max-height: 120px !important;
      resize: none !important;
      overflow-y: auto;
      border: 2px solid var(--line);
      border-radius: 10px;
      outline: none;
      background: var(--field);
      color: var(--ink);
      padding: 12px;
      font: 15px/1.45 Arial, Helvetica, sans-serif;
      white-space: pre-wrap;
      box-shadow:
        0 5px 0 rgba(83, 43, 66, 0.55),
        inset 0 0 0 2px rgba(255, 255, 255, 0.45);
    }

    textarea:focus {
      border-color: var(--line-focus);
      box-shadow:
        0 5px 0 rgba(83, 43, 66, 0.55),
        0 0 0 3px rgba(255, 106, 186, 0.22),
        inset 0 0 0 2px rgba(255, 255, 255, 0.45);
    }

    textarea[readonly] {
      background: var(--field-readonly);
      color: var(--ink);
    }

    textarea.reported-line-field {
      background: rgba(34, 21, 48, 0.94);
      color: #fff7fb;
    }

    button {
      position: relative;
      display: inline-block;
      width: 100%;
      margin-top: 20px;
      padding: 1.15em 2em;
      border: 0;
      border: 2px solid var(--button-border);
      border-radius: 0.75em;
      outline: none;
      background: var(--button-face);
      color: #fff9ff;
      font-size: 16px;
      font-family: "Simple", Arial, Helvetica, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      text-decoration: none;
      vertical-align: middle;
      cursor: pointer;
      transform-style: preserve-3d;
      transition:
        transform 150ms cubic-bezier(0, 0, 0.58, 1),
        background 150ms cubic-bezier(0, 0, 0.58, 1);
    }

    button::before {
      position: absolute;
      inset: 0;
      content: "";
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: var(--button-base);
      box-shadow: 0 0 0 2px var(--button-border), 0 0.55em 0 0 var(--button-shadow);
      transform: translate3d(0, 0.62em, -1em);
      transition:
        transform 150ms cubic-bezier(0, 0, 0.58, 1),
        box-shadow 150ms cubic-bezier(0, 0, 0.58, 1);
    }

    button:hover {
      background: var(--button-face-hover);
      transform: translate(0, 0.18em);
    }

    button:hover::before {
      box-shadow: 0 0 0 2px var(--button-border), 0 0.38em 0 0 var(--button-shadow);
      transform: translate3d(0, 0.44em, -1em);
    }

    button:active {
      background: var(--button-face-hover);
      transform: translate(0, 0.56em);
    }

    button:active::before {
      box-shadow: 0 0 0 2px var(--button-border), 0 0 var(--button-shadow);
      transform: translate3d(0, 0, -1em);
    }

    button:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .status {
      min-height: 20px;
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.28);
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--success);
    }

    iframe {
      display: none;
      width: 0;
      height: 0;
      border: 0;
    }

    @media (max-width: 720px) {
      body {
        align-items: flex-start;
        padding: 14px 12px 22px;
      }

      .brand-logo {
        width: min(330px, 82vw);
        margin-bottom: -24px;
      }

      main {
        padding: 38px 18px 22px;
      }

      .character-art {
        right: -12px;
        bottom: -4px;
        width: min(270px, 58vw);
        opacity: 0.76;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <img class="brand-logo" src="assets/logo-hallowanderband.png" alt="Hallowanderband">

    <main>
      <div class="card-layout">
        <section class="form-area" aria-labelledby="pageTitle">
          <h1 id="pageTitle">Hallowanderband Transration Feedback</h1>
          <p>Please tell us what feels wrong, confusing, or unnatural about this line.</p>

          <form
            id="feedbackForm"
            action="https://docs.google.com/forms/d/e/1FAIpQLScEvQ6uodP99uom6T4WwziKI_2lnnA0EKOSvDhf64i7ZYbKCg/formResponse"
            method="POST"
            target="submitFrame"
          >
            <input id="metaInput" type="hidden" name="entry.719413114" value="">

            <label for="reportedLine">Reported Line <span class="label-note">[Auto-filled]</span></label>
            <textarea id="reportedLine" class="reported-line-field" name="entry.844724730" readonly></textarea>

            <label for="feedback">★ Your Feedback</label>
            <textarea
              id="feedback"
              name="entry.1985870251"
              required
              placeholder="Write the corrected translation or what felt wrong."
            ></textarea>

            <button id="submitButton" type="submit">Submit Feedback</button>
            <div id="status" class="status"></div>
          </form>
        </section>

      </div>

      <iframe id="submitFrame" name="submitFrame" title="Submission target"></iframe>
    </main>

    <img class="character-art" src="assets/character-feedback.png" alt="">
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var meta = normalizeText(params.get("meta") || "");
      var text = normalizeText(params.get("text") || "");

      var metaInput = document.getElementById("metaInput");
      var reportedLine = document.getElementById("reportedLine");
      var form = document.getElementById("feedbackForm");
      var button = document.getElementById("submitButton");
      var status = document.getElementById("status");
      var submitFrame = document.getElementById("submitFrame");
      var submitted = false;

      metaInput.value = meta;
      reportedLine.value = text || "Empty";

      if (!meta || !text) {
        status.textContent = "Some report data is missing. You can still submit feedback.";
        status.className = "status error";
      }

      form.addEventListener("submit", function () {
        submitted = true;
        button.disabled = true;
        status.textContent = "Submitting...";
        status.className = "status";
      });

      submitFrame.addEventListener("load", function () {
        if (!submitted) {
          return;
        }

        status.textContent = "Thank you. Your feedback has been submitted.";
        status.className = "status success";
      });

      function normalizeText(value) {
        return value.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
      }
    })();
  </script>
</body>
</html>
