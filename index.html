<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hallowanderband Transration Feedback</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <style>
    @font-face {
      font-family: "Simple";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-1@1.1/Danjo-bold-Regular.woff2") format("woff2");
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --bg: #1b2838;
      --panel: rgba(36, 22, 49, 0.94);
      --panel-bottom: rgba(27, 40, 56, 0.96);
      --field: #fff7fb;
      --field-readonly: #fff0f0;
      --line: #b18597;
      --line-focus: #ff6aba;
      --text: #fff9fd;
      --ink: #382b22;
      --muted: #ffd6e5;
      --light-pink: #fff0f0;
      --pink: #ffe9e9;
      --dark-pink: #f9c4d2;
      --pink-border: #b18597;
      --pink-shadow: #ffe3e2;
      --button-face: #3a155a;
      --button-face-hover: #4a1b70;
      --button-base: #1d0c2f;
      --button-border: #8f68b3;
      --button-shadow: rgba(24, 7, 39, 0.72);
      --error: #ffb3b3;
      --success: #b7f5c2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      color: var(--text);
      font-family: "Simple", Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 14px;
      background:
        linear-gradient(180deg, rgba(20, 10, 34, 0.24), rgba(8, 14, 24, 0.68)),
        url("assets/bg-feedback.png") center / cover fixed no-repeat,
        var(--bg);
    }

    body::before {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.36), transparent 22%, transparent 78%, rgba(0, 0, 0, 0.36)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.44));
    }

    .page-shell {
      position: relative;
      z-index: 1;
      width: 100%;
      min-width: 0;
      max-width: 720px;
    }

    .brand-logo {
      position: relative;
      z-index: 5;
      display: block;
      width: min(330px, 66vw);
      height: auto;
      margin: 0 auto -88px;
      transform: translateX(10px);
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.5));
    }

    .panel-frame {
      position: relative;
      z-index: 2;
      width: 100%;
      min-width: 0;
      margin: 0 auto;
      padding: 92px 32px 34px;
      border: 5px solid #09080b;
      border-radius: 20px 16px 22px 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.08)),
        #2f2f30;
      box-shadow:
        0 20px 46px rgba(0, 0, 0, 0.5),
        0 0 0 5px #c936d1,
        inset 0 0 0 4px rgba(0, 0, 0, 0.5),
        inset 0 -8px 0 rgba(0, 0, 0, 0.22);
    }

    .panel-ribbons {
      position: absolute;
      left: -72px;
      top: 108px;
      z-index: -1;
      pointer-events: none;
    }

    .panel-ribbon {
      position: absolute;
      width: 112px;
      height: 52px;
      border: 0;
      background: #081947;
      clip-path: polygon(0 0, 100% 0, 88% 50%, 100% 100%, 0 100%, 24% 50%);
    }

    .panel-ribbon::before {
      position: absolute;
      inset: 5px 0 5px 5px;
      content: "";
      background: var(--ribbon-fill);
      clip-path: inherit;
    }

    .panel-ribbon-mint {
      left: 0;
      top: 0;
      --ribbon-fill: linear-gradient(135deg, #f8ffbd 0 36%, #55d5d2 37%);
      transform: rotate(-5deg);
    }

    .panel-ribbon-yellow {
      left: 5px;
      top: 72px;
      width: 112px;
      height: 48px;
      --ribbon-fill: linear-gradient(135deg, #fff7a8 0 38%, #ffd35d 39%);
      clip-path: none;
      transform: rotate(-8deg);
    }

    main {
      position: relative;
      z-index: 2;
      margin: 0;
      padding: 0;
      background: transparent;
    }

    .card-layout {
      display: block;
    }

    .form-area {
      min-width: 0;
    }

    .character-art {
      display: block;
      position: fixed;
      right: max(18px, calc((100vw - 720px) / 2 - 90px));
      bottom: 8px;
      z-index: 3;
      width: 340px;
      height: auto;
      pointer-events: none;
      filter: drop-shadow(0 12px 14px rgba(0, 0, 0, 0.45));
    }

    h1 {
      margin: 0 0 8px;
      color: #fff8fb;
      font-size: 22px;
      line-height: 1.25;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.35);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      color: #ffe6f0;
      font-size: 14px;
      font-weight: 700;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.28);
    }

    .label-note {
      position: relative;
      top: 2px;
      margin-left: 8px;
      color: rgba(224, 218, 230, 0.72);
      font-size: 10px;
      font-style: italic;
      font-weight: normal;
      text-shadow: none;
      vertical-align: middle;
    }

    textarea {
      display: block;
      width: 100%;
      height: 120px !important;
      min-height: 120px !important;
      max-height: 120px !important;
      resize: none !important;
      overflow-y: auto;
      border: 2px solid var(--line);
      border-radius: 10px;
      outline: none;
      background: var(--field);
      color: var(--ink);
      padding: 12px;
      font: 15px/1.45 Arial, Helvetica, sans-serif;
      white-space: pre-wrap;
      box-shadow:
        0 5px 0 rgba(83, 43, 66, 0.55),
        inset 0 0 0 2px rgba(255, 255, 255, 0.45);
    }

    textarea:focus {
      border-color: var(--line-focus);
      box-shadow:
        0 5px 0 rgba(83, 43, 66, 0.55),
        0 0 0 3px rgba(255, 106, 186, 0.22),
        inset 0 0 0 2px rgba(255, 255, 255, 0.45);
    }

    textarea[readonly] {
      background: var(--field-readonly);
      color: var(--ink);
    }

    textarea.reported-line-field {
      background: rgba(34, 21, 48, 0.94);
      color: #fff7fb;
    }

    form.is-submitted #feedback {
      border-color: #76518f;
      background: rgba(34, 21, 48, 0.94);
      color: #fff7fb;
      cursor: default;
      pointer-events: none;
      box-shadow:
        0 5px 0 rgba(18, 12, 28, 0.7),
        inset 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    form.is-submitted #feedback::placeholder {
      color: transparent;
    }

    button {
      position: relative;
      display: inline-block;
      width: 100%;
      margin-top: 30px;
      padding: 1.15em 2em;
      border: 0;
      border: 2px solid var(--button-border);
      border-radius: 0.75em;
      outline: none;
      background: var(--button-face);
      color: #fff9ff;
      font-size: 16px;
      font-family: "Simple", Arial, Helvetica, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      text-decoration: none;
      vertical-align: middle;
      cursor: pointer;
      transform-style: preserve-3d;
      transition:
        transform 150ms cubic-bezier(0, 0, 0.58, 1),
        background 150ms cubic-bezier(0, 0, 0.58, 1);
    }

    button::before {
      position: absolute;
      inset: 0;
      content: "";
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: var(--button-base);
      box-shadow: 0 0 0 2px var(--button-border), 0 0.55em 0 0 var(--button-shadow);
      transform: translate3d(0, 0.62em, -1em);
      transition:
        transform 150ms cubic-bezier(0, 0, 0.58, 1),
        box-shadow 150ms cubic-bezier(0, 0, 0.58, 1);
    }

    button:hover {
      background: var(--button-face-hover);
      transform: translate(0, 0.18em);
    }

    button:hover::before {
      box-shadow: 0 0 0 2px var(--button-border), 0 0.38em 0 0 var(--button-shadow);
      transform: translate3d(0, 0.44em, -1em);
    }

    button:active {
      background: var(--button-face-hover);
      transform: translate(0, 0.56em);
    }

    button:active::before {
      box-shadow: 0 0 0 2px var(--button-border), 0 0 var(--button-shadow);
      transform: translate3d(0, 0, -1em);
    }

    button:disabled {
      opacity: 1;
      cursor: default;
    }

    button:disabled,
    button:disabled:hover,
    button:disabled:active {
      background: var(--button-face);
      cursor: default;
      transform: none;
    }

    button:disabled::before,
    button:disabled:hover::before,
    button:disabled:active::before {
      box-shadow: 0 0 0 2px var(--button-border), 0 0.55em 0 0 var(--button-shadow);
      transform: translate3d(0, 0.62em, -1em);
    }

    button.is-submitting:disabled,
    button.is-submitting:disabled:hover,
    button.is-submitting:disabled:active {
      opacity: 1;
      background: var(--button-face);
      transform: none;
    }

    button.is-submitting:disabled::before,
    button.is-submitting:disabled:hover::before,
    button.is-submitting:disabled:active::before {
      box-shadow: 0 0 0 2px var(--button-border), 0 0.55em 0 0 var(--button-shadow);
      transform: translate3d(0, 0.62em, -1em);
    }

    button.is-complete:disabled,
    button.is-complete:disabled:hover,
    button.is-complete:disabled:active {
      opacity: 1;
      border-color: #85d59d;
      background: #2f8f55;
      color: #f4fff8;
      transform: none;
    }

    button.is-complete:disabled::before,
    button.is-complete:disabled:hover::before,
    button.is-complete:disabled:active::before {
      background: #15592f;
      box-shadow: 0 0 0 2px #85d59d, 0 0.55em 0 0 rgba(17, 78, 40, 0.72);
      transform: translate3d(0, 0.62em, -1em);
    }

    button.close-button {
      position: absolute;
      top: 14px;
      right: 18px;
      z-index: 8;
      display: flex;
      align-items: center;
      justify-content: center;
      --close-button-font-size: 23px;
      --close-button-face-height: 30px;
      --close-button-depth: 9px;
      --close-button-face-offset: 0px;
      width: 54px;
      height: 39px;
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: transparent;
      font-size: 0;
      line-height: 1;
      isolation: isolate;
      overflow: visible;
      text-transform: none;
    }

    button.close-button::before,
    button.close-button::after {
      position: absolute;
      left: 0;
      right: 0;
      content: "";
      width: auto;
      height: var(--close-button-face-height);
      border: 2px solid var(--button-border);
      border-radius: 8px;
      transform: none;
    }

    button.close-button::before {
      top: var(--close-button-depth);
      z-index: 0;
      background: var(--button-base);
      box-shadow: 0 5px 0 rgba(24, 7, 39, 0.72);
    }

    button.close-button::after {
      top: 0;
      z-index: 1;
      background: var(--button-face);
      transform: translateY(var(--close-button-face-offset));
      transition:
        transform 150ms cubic-bezier(0, 0, 0.58, 1),
        background 150ms cubic-bezier(0, 0, 0.58, 1);
    }

    .close-button-label {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      color: inherit;
      line-height: var(--close-button-face-height);
      transform: translateY(calc(var(--close-button-face-offset) - 1px));
      transition: transform 150ms cubic-bezier(0, 0, 0.58, 1);
      pointer-events: none;
    }

    .close-button-icon {
      display: block;
      width: var(--close-button-font-size);
      height: var(--close-button-font-size);
      stroke: currentColor;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    button.close-button:hover {
      background: transparent;
      --close-button-face-offset: 2px;
      transform: none;
    }

    button.close-button:hover::before {
      transform: none;
    }

    button.close-button:hover::after {
      background: var(--button-face-hover);
    }

    button.close-button:active {
      background: transparent;
      --close-button-face-offset: var(--close-button-depth);
      transform: none;
    }

    button.close-button:active::before {
      transform: none;
    }

    button.close-button:active::after {
      background: var(--button-face-hover);
    }

    .status {
      min-height: 20px;
      margin-top: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.28);
    }

    .status.error {
      color: var(--error);
    }

    .status.success {
      color: var(--success);
    }

    iframe {
      display: none;
      width: 0;
      height: 0;
      border: 0;
    }

    @media (min-width: 900px) {
      .page-shell {
        transform: translateX(-42px);
      }
    }

    @media (max-width: 720px) {
      body {
        align-items: flex-start;
        padding: 14px 12px 22px;
      }

      .page-shell {
        width: min(100%, 430px);
        max-width: calc(100vw - 16px);
        margin: 0 auto;
        transform: none;
      }

      .brand-logo {
        width: min(270px, 70vw);
        margin-bottom: -72px;
        transform: translateX(8px);
      }

      .panel-frame {
        width: 100%;
        max-width: 100%;
        margin-left: 0;
        padding: 76px 16px 26px;
      }

      button.close-button {
        top: 10px;
        right: 14px;
        --close-button-font-size: 21px;
        --close-button-face-height: 29px;
        --close-button-depth: 8px;
        width: 52px;
        height: 37px;
        border-radius: 8px;
      }

      .panel-ribbons {
        left: -34px;
        top: 94px;
      }

      .panel-ribbon-mint {
        width: 72px;
        height: 38px;
      }

      .panel-ribbon-yellow {
        left: 5px;
        top: 58px;
        width: 72px;
        height: 34px;
      }

      .character-art {
        display: none;
      }

      h1 {
        font-size: 20px;
      }

      p {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <img class="brand-logo" src="assets/logo-clip.png" alt="Hallowanderband">

    <div class="panel-ribbons" aria-hidden="true">
      <div class="panel-ribbon panel-ribbon-mint"></div>
      <div class="panel-ribbon panel-ribbon-yellow"></div>
    </div>

    <div class="panel-frame">
      <button id="closeButton" class="close-button" type="button" aria-label="Close">
        <span class="close-button-label" aria-hidden="true">
          <svg class="close-button-icon" viewBox="0 0 24 24" focusable="false">
            <path d="M6 6l12 12M18 6L6 18"></path>
          </svg>
        </span>
      </button>

      <main>
        <div class="card-layout">
          <section class="form-area" aria-labelledby="pageTitle">
            <h1 id="pageTitle">Hallowanderband Transration Feedback</h1>
            <p>Please tell us what feels wrong, confusing, or unnatural about this line.</p>

            <form
              id="feedbackForm"
              action="https://docs.google.com/forms/d/e/1FAIpQLScEvQ6uodP99uom6T4WwziKI_2lnnA0EKOSvDhf64i7ZYbKCg/formResponse"
              method="POST"
              target="submitFrame"
            >
              <input id="metaInput" type="hidden" name="entry.719413114" value="">
              <input type="hidden" name="fvv" value="1">
              <input id="partialResponseInput" type="hidden" name="partialResponse" value="">
              <input type="hidden" name="pageHistory" value="0">
              <input id="fbzxInput" type="hidden" name="fbzx" value="">
              <input type="hidden" name="dsdoc" value="true">
              <input type="hidden" name="submissionTimestamp" value="-1">

              <label for="reportedLine">Reported Line <span class="label-note">[Auto-filled]</span></label>
              <textarea id="reportedLine" class="reported-line-field" name="entry.844724730" readonly></textarea>

              <label for="feedback">★ Your Feedback</label>
              <textarea
                id="feedback"
                name="entry.1985870251"
                required
                placeholder="Write the corrected translation or what felt wrong."
              ></textarea>

              <button id="submitButton" type="submit">Submit Feedback</button>
              <div id="status" class="status"></div>
            </form>
          </section>

        </div>

        <iframe id="submitFrame" name="submitFrame" title="Submission target"></iframe>
      </main>
    </div>
  </div>

  <img class="character-art" src="assets/character-feedback.png" alt="">

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var meta = normalizeText(params.get("meta") || "");
      var text = normalizeText(params.get("text") || "");

      var metaInput = document.getElementById("metaInput");
      var partialResponseInput = document.getElementById("partialResponseInput");
      var fbzxInput = document.getElementById("fbzxInput");
      var reportedLine = document.getElementById("reportedLine");
      var feedback = document.getElementById("feedback");
      var form = document.getElementById("feedbackForm");
      var button = document.getElementById("submitButton");
      var closeButton = document.getElementById("closeButton");
      var status = document.getElementById("status");
      var submitFrame = document.getElementById("submitFrame");
      var submitted = false;

      metaInput.value = meta || "Unknown";
      reportedLine.value = text || "Empty";
      prepareGoogleFormSubmissionToken();

      if (!meta || !text) {
        status.textContent = "Some report data is missing. You can still submit feedback.";
        status.className = "status error";
      }

      form.addEventListener("submit", function (event) {
        if (submitted) {
          event.preventDefault();
          return;
        }

        prepareGoogleFormSubmissionToken();
        submitted = true;
        button.disabled = true;
        button.classList.add("is-submitting");
        button.classList.remove("is-complete");
        button.textContent = "Submit Feedback";
        status.textContent = "Submitting...";
        status.className = "status";
      });

      closeButton.addEventListener("click", function () {
        closeReportWindow();
      });

      submitFrame.addEventListener("load", function () {
        if (!submitted) {
          return;
        }

        button.classList.remove("is-submitting");
        button.classList.add("is-complete");
        button.textContent = "Complete";
        form.classList.add("is-submitted");
        feedback.readOnly = true;
        feedback.setAttribute("aria-disabled", "true");
        feedback.tabIndex = -1;
        feedback.blur();
        status.textContent = "Thank you. Your feedback has been submitted.";
        status.className = "status success";
      });

      function normalizeText(value) {
        return value.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
      }

      function prepareGoogleFormSubmissionToken() {
        var token = createGoogleFormToken();
        fbzxInput.value = token;
        partialResponseInput.value = '[null,null,"' + token + '"]';
      }

      function createGoogleFormToken() {
        var token = "";
        for (var i = 0; i < 19; i += 1) {
          token += i === 0 ? String(Math.floor(Math.random() * 9) + 1) : String(Math.floor(Math.random() * 10));
        }

        return Math.random() < 0.5 ? "-" + token : token;
      }

      function closeReportWindow() {
        window.open("", "_self");
        window.close();

        window.setTimeout(function () {
          status.textContent = "Thank you. You can close this window.";
          status.className = "status success";
        }, 250);
      }
    })();
  </script>
</body>
</html>
